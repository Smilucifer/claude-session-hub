<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<style>body{margin:0;height:100vh;display:flex;align-items:center;justify-content:center;background:#1a1d23;color:#e6e6e6;font-family:sans-serif;text-align:center;padding:20px}</style>
</head><body><div id="msg">正在清除缓存…</div>
<script>
(async()=>{
  const m=document.getElementById('msg');
  try{
    const regs=await navigator.serviceWorker.getRegistrations();
    for(const r of regs)await r.unregister();
    const keys=await caches.keys();
    for(const k of keys)await caches.delete(k);
    m.innerHTML='缓存已清除 ✓<br><br>3 秒后自动跳转…';
    setTimeout(()=>location.href='/',3000);
  }catch(e){
    m.innerHTML='清除完成<br><br><a href="/" style="color:#4a90e2">点击进入</a>';
  }
})();
</script></body></html>
